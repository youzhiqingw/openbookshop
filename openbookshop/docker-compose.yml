services:
  # ─────────────────────────────────────────
  # Django 后端服务
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: openbookshop_backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DJANGO_SECRET_KEY=${SECRET_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
    volumes:
      - ./backend/media:/app/media
      - ./backend/static:/app/static
    ports:
      - "8000:8000"
    networks:
      - bookshop_net
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────
  # Vue3 前端服务（Nginx）
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    container_name: openbookshop_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - bookshop_net
    depends_on:
      - backend

  # ─────────────────────────────────────────
  # MySQL 8 数据库（可选，默认使用 SQLite）
  # 如需使用 MySQL，取消注释并修改 backend settings
  # ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: openbookshop_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-bookshop123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bookstore}
      MYSQL_USER: ${MYSQL_USER:-bookshop}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-bookshop123}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - bookshop_net
    # MySQL 配置：使用 utf8mb4 字符集
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-bookshop123}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  db_data:

networks:
  bookshop_net:
    driver: bridge
