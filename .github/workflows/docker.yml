name: Docker Build and Push

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Check Docker credentials
      id: docker_creds
      run: |
        if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "available=false" >> $GITHUB_OUTPUT
          echo "Docker credentials not configured; images will be built but not pushed."
        fi
      env:
        DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Login to DockerHub
      if: github.event_name != 'pull_request' && steps.docker_creds.outputs.available == 'true'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME || 'openbookshop' }}/openbookshop
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha

    - name: Build and push backend
      uses: docker/build-push-action@v5
      with:
        context: ./openbookshop/backend
        file: ./openbookshop/backend/Dockerfile
        push: ${{ github.event_name != 'pull_request' && steps.docker_creds.outputs.available == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}-backend
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build and push frontend
      uses: docker/build-push-action@v5
      with:
        context: ./openbookshop/frontend
        file: ./openbookshop/frontend/Dockerfile
        push: ${{ github.event_name != 'pull_request' && steps.docker_creds.outputs.available == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}-frontend
        labels: ${{ steps.meta.outputs.labels }}

    - name: Summary
      if: github.event_name != 'pull_request' && steps.docker_creds.outputs.available == 'true'
      run: |
        echo "Docker images built and pushed successfully"
        echo "Backend: ${{ steps.meta.outputs.tags }}-backend"
        echo "Frontend: ${{ steps.meta.outputs.tags }}-frontend"
