name: i18n Playwright Tests

on:
  push:
    branches: [master]
    paths:
      - 'web/src/**'
      - 'web/tests/**'
      - 'web/package.json'
      - 'web/playwright.config.ts'
      - '.github/workflows/playwright-i18n.yml'
  pull_request:
    paths:
      - 'web/src/**'
      - 'web/tests/**'
      - 'web/package.json'
      - 'web/playwright.config.ts'
      - '.github/workflows/playwright-i18n.yml'

jobs:
  i18n-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Start Django backend
        run: |
          cd backend
          pip install -r requirements.txt -q
          python manage.py runserver 0.0.0.0:8000 &
          # Wait for backend to be ready
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/api/login/ > /dev/null 2>&1; then
              echo "Backend is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "Backend failed to start"
              exit 1
            fi
            sleep 1
          done

      - name: Run Playwright i18n tests
        run: pnpm exec playwright test --reporter=list --project=chromium --workers=1
        env:
          CI: 'true'
          TEST_ADMIN_USER: admin
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: web/test-results/
          retention-days: 14
